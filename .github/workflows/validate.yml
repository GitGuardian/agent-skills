name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          set -e
          for f in $(find . -type f -name '*.json' -not -path './node_modules/*'); do
            echo "Checking $f"
            jq empty "$f"
          done

      - name: Check marketplace.json required fields
        run: |
          set -e
          F=.claude-plugin/marketplace.json
          jq -e '.name and .owner.name and (.plugins | type == "array" and length > 0)' "$F" > /dev/null
          jq -e '.plugins | all(.name and .description and .source)' "$F" > /dev/null

      - name: Check Claude Code plugin.json has required fields
        run: |
          set -e
          F=.claude-plugin/plugin.json
          test -f "$F" || { echo "missing $F"; exit 1; }
          jq -e '.name and .description' "$F" > /dev/null

      - name: Check Cursor plugin.json has required fields
        run: |
          set -e
          F=.cursor-plugin/plugin.json
          test -f "$F" || { echo "missing $F"; exit 1; }
          jq -e '.name and .description' "$F" > /dev/null

      - name: Check Cursor marketplace.json required fields
        run: |
          set -e
          F=.cursor-plugin/marketplace.json
          jq -e '.name and .owner.name and (.plugins | type == "array" and length > 0)' "$F" > /dev/null
          jq -e '.plugins | all(.name and .description and .source)' "$F" > /dev/null

      - name: Check Codex plugin.json required fields
        run: |
          set -e
          F=.codex-plugin/plugin.json
          test -f "$F" || { echo "missing $F"; exit 1; }
          jq -e '.name and .version and .description and .skills and .mcpServers and .interface.displayName' "$F" > /dev/null
          jq -e '(.skills | startswith("./")) and (.mcpServers | startswith("./")) and (.interface.logo | startswith("./"))' "$F" > /dev/null

      - name: Check Codex marketplace.json required fields
        run: |
          set -e
          F=.agents/plugins/marketplace.json
          test -f "$F" || { echo "missing $F"; exit 1; }
          jq -e '.name and (.plugins | type == "array" and length > 0)' "$F" > /dev/null
          jq -e '.plugins | all(.name and .source and .policy.installation and .policy.authentication and .category)' "$F" > /dev/null

      - name: Check Codex MCP config shape
        run: |
          set -e
          MCP="$(jq -r '.mcpServers' .codex-plugin/plugin.json)"
          test -f "$MCP" || { echo "missing Codex MCP config $MCP"; exit 1; }
          jq -e '
            if has("mcp_servers") then
              (.mcp_servers | type == "object")
            elif has("mcpServers") then
              false
            else
              (type == "object")
            end
          ' "$MCP" > /dev/null

      - name: Check Codex docs do not use stale install command
        run: |
          set -e
          ! grep -R "codex plugin install" README.md AGENTS.md

      - name: Check plugin versions stay in sync
        run: |
          set -e
          VERSION="$(jq -r '.version' package.json)"
          test "$(jq -r '.version' .claude-plugin/plugin.json)" = "$VERSION"
          test "$(jq -r '.metadata.version' .claude-plugin/marketplace.json)" = "$VERSION"
          test "$(jq -r '.version' .cursor-plugin/plugin.json)" = "$VERSION"
          test "$(jq -r '.metadata.version' .cursor-plugin/marketplace.json)" = "$VERSION"
          test "$(jq -r '.version' .codex-plugin/plugin.json)" = "$VERSION"

      - name: Check each skill has SKILL.md with frontmatter
        run: |
          set -e
          shopt -s globstar nullglob
          for f in skills/*/SKILL.md; do
            head -1 "$f" | grep -q '^---$' || { echo "missing frontmatter in $f"; exit 1; }
            grep -q '^name:' "$f" || { echo "missing 'name:' in $f"; exit 1; }
            grep -q '^description:' "$f" || { echo "missing 'description:' in $f"; exit 1; }
          done

      # Canonical cross-vendor validator for the agent-skills spec
      # (https://agentskills.io/specification). Catches strict-YAML
      # frontmatter errors and naming-rule violations that the shell
      # checks above miss — e.g., unquoted colons in description fields,
      # uppercase letters in the name, consecutive hyphens, etc.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install agent-skills spec validator
        run: |
          pip install "skills-ref @ git+https://github.com/agentskills/agentskills.git#subdirectory=skills-ref"

      - name: Validate every skill against the agent-skills spec
        run: |
          set -e
          for d in skills/*/; do
            echo "Validating $d"
            skills-ref validate "$d"
          done

      - name: Check Kiro POWER.md has frontmatter
        run: |
          set -e
          F=kiro/POWER.md
          test -f "$F" || { echo "missing $F"; exit 1; }
          head -1 "$F" | grep -q '^---$' || { echo "missing frontmatter in $F"; exit 1; }
          for k in name displayName description keywords; do
            grep -q "^$k:" "$F" || { echo "missing '$k:' in $F"; exit 1; }
          done

      - name: Run claude plugin validate
        # Runs the same validator Anthropic's community-marketplace
        # submission pipeline uses. Local file-system check only — no
        # auth or network access required.
        # See: https://code.claude.com/docs/en/plugins#submit-your-plugin-to-the-community-marketplace
        run: |
          set -e
          npm install -g @anthropic-ai/claude-code@latest
          claude plugin validate .
