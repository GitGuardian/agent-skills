<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">GitGuardian Agent Skills Terminal Visual</title>
  <desc id="desc">A terminal-themed visual for GitGuardian Agent Skills, showing command-line prompts that trigger security skills for AI coding agents.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f11"/>
      <stop offset="1" stop-color="#101113"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151719"/>
      <stop offset="1" stop-color="#0c0d0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b6bdc6"/>
      <stop offset="1" stop-color="#7d8791"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>

  <g opacity="0.16">
    <text x="52" y="82" fill="#b6bdc6" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="18">~/workspace $</text>
    <text x="920" y="148" fill="#b6bdc6" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="18">stdout</text>
    <text x="62" y="552" fill="#b6bdc6" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="18">exit 0</text>
    <path d="M0 488 C180 420 310 440 474 358 C628 282 760 310 922 376 C1044 426 1134 398 1200 352" fill="none" stroke="#b6bdc6" stroke-width="2"/>
  </g>

  <g transform="translate(92 70)">
    <text x="0" y="32" fill="#d7dce2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="760" letter-spacing="2">GITGUARDIAN</text>
    <text x="0" y="92" fill="#f2f4f6" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="64" font-weight="780">Agent Skills</text>
  </g>

  <g transform="translate(92 186)" filter="url(#shadow)">
    <rect x="0" y="0" width="1016" height="322" rx="10" fill="url(#terminal)" stroke="#34383e" stroke-width="2"/>
    <rect x="0" y="0" width="1016" height="52" rx="10" fill="#222a2d"/>
    <circle cx="29" cy="26" r="7" fill="#6b7078"/>
    <circle cx="54" cy="26" r="7" fill="#6b7078"/>
    <circle cx="79" cy="26" r="7" fill="#b6bdc6"/>
    <text x="116" y="33" fill="#858b93" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="16">codex — /Users/dev/project</text>

    <g transform="translate(42 86)">
      <text x="0" y="0" fill="#b6bdc6" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="24">$</text>
      <text x="34" y="0" fill="#f2f4f6" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="24">/gitguardian:scan-secrets</text>
      <rect x="390" y="-23" width="14" height="29" fill="#b6bdc6">
        <animate attributeName="opacity" values="1;1;0;0;1" dur="1.2s" repeatCount="indefinite"/>
      </rect>

      <text x="0" y="48" fill="#858b93" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="18">agent</text>
      <text x="78" y="48" fill="#c3c8cf" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="18">loading skill instructions...</text>

      <text x="0" y="88" fill="#b6bdc6" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="18">run</text>
      <text x="78" y="88" fill="#f2f4f6" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="18">ggshield secret scan pre-push</text>

      <g transform="translate(0 126)">
        <rect x="0" y="0" width="932" height="66" rx="8" fill="#2b181b" stroke="#9b4650"/>
        <text x="22" y="27" fill="#ff9aa7" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="17">secret detected</text>
        <text x="210" y="27" fill="#f2f4f6" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="17">src/config.ts:18</text>
        <text x="426" y="27" fill="#c3c8cf" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="17">AWS Access Key ID</text>
        <text x="22" y="51" fill="#d9a8ae" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Commit blocked before push. Rotate the key, remove it from code, then scan again.</text>
      </g>

      <g transform="translate(0 222)">
        <rect x="0" y="0" width="226" height="42" rx="7" fill="#181a1d" stroke="#3a3f46"/>
        <text x="22" y="27" fill="#e3e6ea" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">scan-secrets</text>

        <rect x="246" y="0" width="226" height="42" rx="7" fill="#181a1d" stroke="#3a3f46"/>
        <text x="268" y="27" fill="#e3e6ea" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">honeytokens</text>

        <rect x="492" y="0" width="226" height="42" rx="7" fill="#181a1d" stroke="#3a3f46"/>
        <text x="514" y="27" fill="#e3e6ea" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">check-hmsl</text>

        <rect x="738" y="0" width="194" height="42" rx="7" fill="#181a1d" stroke="#3a3f46"/>
        <text x="760" y="27" fill="#e3e6ea" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">scan-machine</text>
      </g>
    </g>
  </g>
</svg>
